name: build-and-push

on:
  push:
    branches: ["deploy"]

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: generate-tags
        run: echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v4
        with:
          context: ./api
          push: true
          tags: |
           ${{ secrets.DOCKERHUB_USERNAME }}/kauppalista-api:${{ steps.generate-tags.outputs.TAG }},
           ${{ secrets.DOCKERHUB_USERNAME }}/kauppalista-api:latest

  build-client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Validate client auth build variables
        env:
          VITE_AUTH_AUTHORITY: ${{ secrets.VITE_AUTH_AUTHORITY }}
          VITE_AUTH_CLIENT_ID: ${{ secrets.VITE_AUTH_CLIENT_ID }}
          VITE_AUTH_AUDIENCE: ${{ secrets.VITE_AUTH_AUDIENCE }}
        run: |
          set -e
          if [ -z "$VITE_AUTH_AUTHORITY" ]; then
            echo "Missing repository variable: VITE_AUTH_AUTHORITY"
            exit 1
          fi
          if [ -z "$VITE_AUTH_CLIENT_ID" ]; then
            echo "Missing repository variable: VITE_AUTH_CLIENT_ID"
            exit 1
          fi
          if [ -z "$VITE_AUTH_AUDIENCE" ]; then
            echo "Missing repository variable: VITE_AUTH_AUDIENCE"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: generate-tags
        run: echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Client image
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: true
          build-args: |
            VITE_AUTH_AUTHORITY=${{ secrets.VITE_AUTH_AUTHORITY }}
            VITE_AUTH_CLIENT_ID=${{ secrets.VITE_AUTH_CLIENT_ID }}
            VITE_AUTH_AUDIENCE=${{ secrets.VITE_AUTH_AUDIENCE }}
            VITE_AUTH_SCOPE=${{ secrets.VITE_AUTH_SCOPE || 'openid profile email' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kauppalista-client:${{ steps.generate-tags.outputs.TAG }},
            ${{ secrets.DOCKERHUB_USERNAME }}/kauppalista-client:latest